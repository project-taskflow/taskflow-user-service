createNamespace: false
namespace: dev
namespaceLabels:
  environment: dev

configMap:
  enabled: true
  name: app-config
  data:
    AUTH_SERVICE_URL: "http://auth-service:3001"
    USER_SERVICE_URL: "http://user-service:3002"
    TASK_SERVICE_URL: "http://task-service:3003"
    NOTIFICATION_SERVICE_URL: "http://notification-service:3004"
    ANALYTICS_SERVICE_URL: "http://analytics-service:3005"
    ALLOWED_ORIGINS: "*"
    JWT_EXPIRES_IN: "7d"
    NODE_ENV: "development"

secret:
  enabled: true
  name: app-secrets
  type: Opaque
  stringData:
    JWT_SECRET: "change_this_dev_secret_32chars_min"
    MONGODB_URI: "mongodb://mongo:27017/taskflow"
  data: {}

storageClass:
  enabled: true
  name: storage
  provisioner: nfs.csi.k8s.io
  parameters:
    server: 10.0.1.212
    share: /var/nfs/general/task-Project

mongo:
  appLabel: mongo
  statefulSet:
    enabled: true
    name: mongo
    replicas: 1
    image: mongo
    imagePullPolicy: IfNotPresent
    containerPort: 27017
    database: taskflow
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "200m"
        memory: "512Mi"
    volumeMount:
      name: mongo-vct
      mountPath: /data/db
    volumeClaimTemplate:
      name: mongo-vct
      accessModes:
        - ReadWriteMany
      storageClassName: storage
      size: 2Gi
  service:
    enabled: true
    name: mongo
    port: 27017
    targetPort: 27017
    type: ClusterIP

authService:
  enabled: true
  name: auth-service
  replicas: 1
  image: thanusri22/auth-service:v1.1.1
  imagePullPolicy: Always
  containerPort: 3001
  servicePort: 3001
  serviceTargetPort: 3001
  serviceType: ClusterIP
  env:
    - name: PORT
      value: "3001"
    - name: MONGODB_URI
      valueFrom:
        secretKeyRef:
          name: app-secrets
          key: MONGODB_URI
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: app-secrets
          key: JWT_SECRET
    - name: JWT_EXPIRES_IN
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: JWT_EXPIRES_IN
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

userService:
  enabled: true
  name: user-service
  replicas: 1
  image: thanusri22/user-service:v1.1.1
  imagePullPolicy: Always
  containerPort: 3002
  servicePort: 3002
  serviceTargetPort: 3002
  serviceType: ClusterIP
  env:
    - name: PORT
      value: "3002"
    - name: MONGODB_URI
      valueFrom:
        secretKeyRef:
          name: app-secrets
          key: MONGODB_URI
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

taskService:
  enabled: true
  name: task-service
  replicas: 1
  image: thanusri22/task-service:v1.1.1
  imagePullPolicy: Always
  containerPort: 3003
  servicePort: 3003
  serviceTargetPort: 3003
  serviceType: ClusterIP
  env:
    - name: PORT
      value: "3003"
    - name: MONGODB_URI
      valueFrom:
        secretKeyRef:
          name: app-secrets
          key: MONGODB_URI
    - name: NOTIFICATION_SERVICE_URL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: NOTIFICATION_SERVICE_URL
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

notificationService:
  enabled: true
  name: notification-service
  replicas: 1
  image: thanusri22/notification-service:v1.1.1
  imagePullPolicy: Always
  containerPort: 3004
  servicePort: 3004
  serviceTargetPort: 3004
  serviceType: ClusterIP
  env:
    - name: PORT
      value: "3004"
    - name: MONGODB_URI
      valueFrom:
        secretKeyRef:
          name: app-secrets
          key: MONGODB_URI
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

analyticsService:
  enabled: true
  name: analytics-service
  replicas: 1
  image: thanusri22/analytics-service:v1.1.1
  imagePullPolicy: Always
  containerPort: 3005
  servicePort: 3005
  serviceTargetPort: 3005
  serviceType: ClusterIP
  env:
    - name: PORT
      value: "3005"
    - name: MONGODB_URI
      valueFrom:
        secretKeyRef:
          name: app-secrets
          key: MONGODB_URI
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

apiGateway:
  enabled: true
  name: api-gateway
  replicas: 1
  image: thanusri22/api-gateway:v1.1.1
  imagePullPolicy: Always
  containerPort: 3000
  servicePort: 3000
  serviceTargetPort: 3000
  serviceType: ClusterIP
  env:
    - name: PORT
      value: "3000"
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: app-secrets
          key: JWT_SECRET
    - name: AUTH_SERVICE_URL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: AUTH_SERVICE_URL
    - name: USER_SERVICE_URL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: USER_SERVICE_URL
    - name: TASK_SERVICE_URL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: TASK_SERVICE_URL
    - name: NOTIFICATION_SERVICE_URL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: NOTIFICATION_SERVICE_URL
    - name: ANALYTICS_SERVICE_URL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: ANALYTICS_SERVICE_URL
    - name: ALLOWED_ORIGINS
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: ALLOWED_ORIGINS
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

frontend:
  enabled: true
  name: frontend
  replicas: 1
  image: thanusri22/frontend:v1.1.1
  imagePullPolicy: Always
  containerPort: 8080
  servicePort: 80
  serviceTargetPort: 8080
  serviceType: ClusterIP
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

gateway:
  enabled: true
  apiVersion: gateway.networking.k8s.io/v1
  name: task-gateway
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same

httpRoute:
  enabled: true
  apiVersion: gateway.networking.k8s.io/v1
  name: task-route
  parentRefs:
    - name: task-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: auth-service
          port: 3001
    - matches:
        - path:
            type: PathPrefix
            value: /users
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: user-service
          port: 3002
    - matches:
        - path:
            type: PathPrefix
            value: /tasks
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: task-service
          port: 3003
    - matches:
        - path:
            type: PathPrefix
            value: /notifications
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: notification-service
          port: 3004
    - matches:
        - path:
            type: PathPrefix
            value: /analytics
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: analytics-service
          port: 3005
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
