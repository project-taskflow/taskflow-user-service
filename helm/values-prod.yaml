namespace: prod
namespaceLabels:
  environment: prod

configMap:
  data:
    ALLOWED_ORIGINS: "https://taskflow.example.com"
    JWT_EXPIRES_IN: "1d"
    NODE_ENV: "production"

secret:
  stringData: null
  data:
    JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_STRONG_SECRET
    MONGODB_URI: REPLACE_WITH_BASE64_ENCODED_ATLAS_URI

mongo:
  statefulSet:
    volumeClaimTemplate:
      size: 50Gi

authService:
  replicas: 2
  image: YOUR_REGISTRY/auth-service:latest
  imagePullPolicy: IfNotPresent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  livenessProbe:
    httpGet:
      path: /health
      port: 3001
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /health
      port: 3001
    initialDelaySeconds: 5
    periodSeconds: 10

