name: User Service CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag in the format notification-service-vX.Y.Z
        required: true
        type: string

jobs:
  ci:
    if: github.event_name != 'workflow_dispatch'
    uses: project-taskflow/taskflow/.github/workflows/reusable-ci.yaml@main
    with:
      trigger_event: ${{ github.event_name }}
      source_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      service_name: user-service
      image_name: user-service
      helm_values_key: userService
      dev_manifest_path: argocd/dev/user-service-application.yaml
      sonar_key: project-taskflow_taskflow-user-service_33d2b59f-342d-4639-a635-5a8ae19be85b
      docker_context: .
      dockerfile_path: ./Dockerfile
      working_directory: .
      infra_repository: project-taskflow/taskflow
      infra_ref: main
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_URL: ${{ secrets.SONAR_URL }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      TOKEN: ${{ secrets.TOKEN }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

  release:
    if: github.event_name == 'workflow_dispatch'
    uses: project-taskflow/taskflow/.github/workflows/reusable-release.yaml@main
    with:
      release_tag: ${{ inputs.release_tag }}
      service_name: user-service
      image_name: user-service
      helm_values_key: userService
      dev_manifest_path: argocd-test/dev/user-service-application.yaml
      prod_manifest_path: argocd-test/prod/user-service-application.yaml
      infra_repository: project-taskflow/taskflow
      infra_ref: main
    secrets:
      TOKEN: ${{ secrets.TOKEN }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

