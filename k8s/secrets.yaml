# IMPORTANT: Replace base64 values before applying.
# Generate: echo -n "your_value" | base64
# Apply via: kubectl apply -f secrets.yaml -n dev
# Or better: use Sealed Secrets / External Secrets Operator in production.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: dev
type: Opaque
stringData:
  # echo -n "change_this_dev_secret_32chars_min" | base64
  JWT_SECRET: "change_this_dev_secret_32chars_min"
  # echo -n "mongodb://mongo:27017/taskflow" | base64
  MONGODB_URI: "mongodb://mongo:27017/taskflow"
